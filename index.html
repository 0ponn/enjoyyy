<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enjoyyy - Mystery Music</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: #fff;
      background-image: url('https://cdn.spacetelescope.org/archives/images/wallpaper2/heic0406a.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
    }
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 820px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    .title { text-align: center; font-size: 40px; font-weight: 800; letter-spacing: 0.08em; margin: 0 0 8px; text-shadow: 0 0 30px rgba(147,51,234,.7), 0 0 60px rgba(147,51,234,.35); }
    .tagline { text-align: center; color: #c4b5fd; margin: 0 0 20px; font-size: 16px; }

    .input-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .input { flex: 1; padding: 12px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12); color: #fff; outline: none; }
    .input::placeholder { color: rgba(255,255,255,0.6); }
    .btn { padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: linear-gradient(135deg,#7c3aed,#ec4899); color: #fff; cursor: pointer; font-weight: 700; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    #status { text-align: center; color: #ddd; font-size: 14px; min-height: 20px; margin-bottom: 10px; }

    .visualizer-wrap { position: relative; width: 100%; height: 260px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.6)); }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    .controls { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
    audio { width: 100%; }

    .mystery { margin-top: 10px; padding: 12px; text-align: center; border: 1px solid rgba(147,51,234,.35); border-radius: 10px; background: linear-gradient(135deg, rgba(147,51,234,.18), rgba(219,39,119,.18)); }
    .mystery .big { font-size: 18px; margin-bottom: 4px; }
    .mystery .hint { font-size: 14px; color: #e9d5ff; }

    .share { margin-top: 14px; padding: 10px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; }
    .share-row { display: flex; gap: 8px; }
    .share input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12); color: #fff; }

    .reveal { margin-top: 16px; display: none; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.5); }
    .reveal.show { display: block; }
    .reveal .title { font-size: 22px; text-shadow: none; letter-spacing: normal; margin-bottom: 6px; }
    .reveal .meta { color: #cbd5e1; font-size: 14px; margin-bottom: 8px; }
    .reveal .desc { font-size: 14px; color: #e2e8f0; }
    .reveal a { color: #86efac; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Enjoyyy</div>
    <div class="tagline">Share music mysteriously. Listen completely. Discover finally.</div>

    <div class="input-row">
      <input id="youtube-input" class="input" type="text" placeholder="Paste YouTube URL here..." />
      <button id="load-btn" class="btn">Create Mystery Link</button>
    </div>

    <div id="status"></div>

    <div class="visualizer-wrap" id="viz-wrap" style="display:none;">
      <canvas id="viz"></canvas>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <audio id="audio" controls></audio>
    </div>

    <div class="mystery" id="mystery" style="display:none;">
      <div class="big">🎭 Want to know what song this is?</div>
      <div class="hint" id="mystery-hint">Listen until the end to reveal the mystery!</div>
    </div>

    <div class="share" id="share" style="display:none;">
      <div style="margin-bottom:6px; font-weight:600;">Share this anonymous link:</div>
      <div class="share-row">
        <input id="share-link" readonly />
        <button class="btn" id="copy-btn">Copy</button>
      </div>
    </div>

    <div class="reveal" id="reveal">
      <div class="title" id="reveal-title"></div>
      <div class="meta" id="reveal-meta"></div>
      <div class="desc" id="reveal-desc"></div>
      <div style="margin-top:8px;"><a id="reveal-link" href="#" target="_blank">Watch on YouTube</a></div>
    </div>
  </div>

<script>
  const API = ''; // same origin
  const qs = (s) => document.querySelector(s);
  const input = qs('#youtube-input');
  const loadBtn = qs('#load-btn');
  const statusEl = qs('#status');
  const audio = qs('#audio');
  const vizWrap = qs('#viz-wrap');
  const canvas = qs('#viz');
  const shareBox = qs('#share');
  const shareLink = qs('#share-link');
  const copyBtn = qs('#copy-btn');
  const mystery = qs('#mystery');
  const mysteryHint = qs('#mystery-hint');
  const reveal = qs('#reveal');
  const revealTitle = qs('#reveal-title');
  const revealMeta = qs('#reveal-meta');
  const revealDesc = qs('#reveal-desc');
  const revealLink = qs('#reveal-link');
  const controls = qs('#controls');

  let currentId = null;
  let audioCtx, analyser, source, rafId;

  function setStatus(msg) { statusEl.textContent = msg || ''; }

  async function extract(url) {
    setStatus('Loading audio...');
    try {
      const res = await fetch(`${API}/api/extract`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed to extract');
      currentId = data.id;
      audio.src = `${API}/api/stream?id=${currentId}`;
      controls.style.display = 'flex';
      vizWrap.style.display = 'block';
      mystery.style.display = 'block';
      shareBox.style.display = 'block';
      shareLink.value = `${location.origin}${location.pathname}?v=${currentId}`;
      setStatus('Ready! Press play.');
    } catch (e) { setStatus(e.message); }
  }

  // Visualizer
  function startViz() {
    if (audioCtx) return; // once
    canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser); analyser.connect(audioCtx.destination);

    const ctx = canvas.getContext('2d');
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    function draw() {
      rafId = requestAnimationFrame(draw);
      analyser.getByteFrequencyData(dataArray);
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(0,0,canvas.width, canvas.height);
      const barW = (canvas.width / bufferLength) * 2.5;
      let x = 0;
      for (let i=0;i<bufferLength;i++) {
        const v = dataArray[i]/255;
        const h = v * canvas.height * 0.75;
        const hue = 200 + v * 80; // blue → purple
        ctx.fillStyle = `hsla(${hue},100%,${50+v*30}%,${0.45+v*0.55})`;
        ctx.fillRect(x, canvas.height - h, Math.max(2, barW), h);
        x += barW + 1;
      }
    }
    draw();
  }

  // Reveal on end
  audio.addEventListener('ended', async () => {
    if (!currentId) return;
    try {
      const res = await fetch(`${API}/api/metadata?id=${currentId}`);
      const meta = await res.json();
      revealTitle.textContent = meta.title || 'Unknown Title';
      revealMeta.textContent = `by ${meta.uploader || 'Unknown'} • ${meta.view_count || 0} views`;
      revealDesc.textContent = meta.description || '';
      revealLink.href = meta.webpage_url || '#';
      reveal.classList.add('show');
      mystery.style.display = 'none';
    } catch (e) { console.error(e); }
  });

  // Progress hint
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const remaining = Math.max(0, audio.duration - audio.currentTime);
    if (remaining <= 10) mysteryHint.textContent = `Almost there! ${Math.ceil(remaining)} seconds until the reveal...`;
    else if (remaining <= 30) mysteryHint.textContent = `Getting closer! ${Math.ceil(remaining)} seconds to go...`;
  });

  // Events
  loadBtn.addEventListener('click', () => {
    const url = input.value.trim(); if (!url) return;
    extract(url);
  });
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadBtn.click(); });
  copyBtn.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(shareLink.value); setStatus('Link copied!'); setTimeout(()=>setStatus(''),1500);} catch {}
  });
  audio.addEventListener('play', async () => { try { if (audioCtx && audioCtx.state==='suspended') await audioCtx.resume(); startViz(); } catch {} });

  // Handle shared links
  (function initFromQuery(){
    const params = new URLSearchParams(location.search);
    const v = params.get('v');
    if (v) {
      currentId = v;
      audio.src = `${API}/api/stream?id=${currentId}`;
      controls.style.display = 'flex';
      vizWrap.style.display = 'block';
      mystery.style.display = 'block';
      shareBox.style.display = 'block';
      shareLink.value = `${location.origin}${location.pathname}?v=${currentId}`;
      setStatus('Mystery track loaded! Press play to begin.');
    }
  })();
</script>
</body>
</html>
