<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }

        #visualizer-container {
            position: relative;
            width: 80%;
            height: 400px;
            max-width: 800px;
            border: 2px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            background-color: #161b22;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #21262d;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            display: none;
            z-index: 10;
        }

        .message-box p {
            margin: 0 0 1rem 0;
        }

        .message-box button {
            background-color: #238636;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .message-box button:hover {
            background-color: #2ea043;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }

        .controls button {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .controls button:hover {
            background-color: #30363d;
        }

        #volume-slider {
            width: 120px;
            -webkit-appearance: none;
            background: #21262d;
            height: 8px;
            border-radius: 4px;
            outline: none;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #238636;
            border-radius: 50%;
            cursor: pointer;
        }

        #volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #238636;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center p-4">

    <div id="message-modal" class="message-box">
        <p>This is an anonymous music link. Click "Play" to start the music.</p>
        <button id="play-button">Play</button>
    </div>

    <div class="content-container">
        <h1 class="text-4xl font-bold mb-8 text-center">Mystery Audio Experience</h1>
        <p class="text-lg text-center mb-6 max-w-2xl">
            A song shared just for you. There are no titles, no artists, just the pure sound.
            Press play and enjoy the mystery.
        </p>

        <div id="visualizer-container">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="w-full max-w-md mt-6">
            <input type="range" id="seek-slider" min="0" max="100" step="0.1" value="0" 
                   class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            <div class="flex justify-between text-xs text-gray-400 mt-1">
                <span id="current-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
        </div>

        <div class="controls mt-4 flex items-center justify-center gap-4">
            <button id="toggle-play-pause" class="flex items-center space-x-2">
                <svg id="play-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>
                </svg>
                <svg id="pause-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                <span>Play / Pause</span>
            </button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
        </div>

        <div id="message" class="mt-4 text-center text-sm text-gray-400"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let audioSource = null;
            let analyser = null;
            let audioBuffer = null;
            let sourceNode = null;
            let isPlaying = false;
            let isPaused = false;
            let startTime = 0;
            let pauseTime = 0;
            let animationId = null;

            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            const playButton = document.getElementById('play-button');
            const togglePlayPauseButton = document.getElementById('toggle-play-pause');
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const volumeSlider = document.getElementById('volume-slider');
            const seekSlider = document.getElementById('seek-slider');
            const currentTimeEl = document.getElementById('current-time');
            const totalTimeEl = document.getElementById('total-time');
            const messageModal = document.getElementById('message-modal');

            // Set canvas dimensions properly
            const resizeCanvas = () => {
                const container = canvas.parentElement;
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
            };
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Format time helper
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            // Update time display
            const updateTimeDisplay = () => {
                if (!audioBuffer) return;
                
                const currentTime = isPlaying ? (audioCtx.currentTime - startTime + (isPaused ? pauseTime : 0)) : pauseTime;
                const duration = audioBuffer.duration;
                
                currentTimeEl.textContent = formatTime(currentTime);
                totalTimeEl.textContent = formatTime(duration);
                
                if (!seekSlider.matches(':active')) { // Don't update if user is dragging
                    seekSlider.value = (currentTime / duration) * 100;
                }
            };

            // Replace with your own audio file URL (a short, royalty-free one is best for this example)
            // Note: In a real app, this URL would be dynamic, passed via the URL, or fetched from a database.
            const audioUrl = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';

            const getAudioData = async () => {
                try {
                    showMessage("Loading audio...");
                    const response = await fetch(audioUrl);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    totalTimeEl.textContent = formatTime(audioBuffer.duration);
                    showMessage("Audio loaded successfully!");
                } catch (err) {
                    console.error('Audio loading error:', err);
                    showMessage(`Error loading audio: ${err.message}. Please try refreshing the page.`);
                    // Disable play button if audio fails to load
                    playButton.disabled = true;
                    togglePlayPauseButton.disabled = true;
                }
            };

            const setupAudioNodes = () => {
                if (sourceNode) {
                    sourceNode.disconnect();
                }
                sourceNode = audioCtx.createBufferSource();
                sourceNode.buffer = audioBuffer;
                sourceNode.loop = true;

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;

                audioSource = audioCtx.createGain();

                sourceNode.connect(audioSource);
                audioSource.connect(analyser);
                analyser.connect(audioCtx.destination);
            };

            const playAudio = () => {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                if (!audioBuffer) {
                    showMessage("Audio not loaded yet. Please wait and try again.");
                    return;
                }
                
                if (sourceNode) {
                    sourceNode.stop();
                }

                setupAudioNodes();
                
                // Handle resume from pause
                if (isPaused) {
                    sourceNode.start(0, pauseTime);
                    startTime = audioCtx.currentTime - pauseTime;
                    isPaused = false;
                } else {
                    sourceNode.start(0);
                    startTime = audioCtx.currentTime;
                }
                
                isPlaying = true;
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                showMessage("Enjoy the music!");
            };

            const pauseAudio = () => {
                if (sourceNode && isPlaying) {
                    pauseTime = audioCtx.currentTime - startTime;
                    sourceNode.stop();
                    isPaused = true;
                }
                isPlaying = false;
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            };

            const togglePlayPause = () => {
                if (isPlaying) {
                    pauseAudio();
                } else {
                    playAudio();
                }
            };

            const showMessage = (message) => {
                const messageEl = document.getElementById('message');
                messageEl.textContent = message;
                setTimeout(() => messageEl.textContent = '', 3000);
            };

            const drawVisualizer = () => {
                if (!isPlaying || !analyser) {
                    animationId = requestAnimationFrame(drawVisualizer);
                    return;
                }

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                // Clear canvas with background color
                canvasCtx.fillStyle = '#161b22';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                // Calculate bar dimensions
                const numBars = Math.min(bufferLength, 64); // Limit bars for performance
                const barWidth = Math.max(2, (canvas.width / numBars) - 2);
                let x = 0;

                for (let i = 0; i < numBars; i++) {
                    // Average frequency data for smoother visualization
                    const dataIndex = Math.floor(i * bufferLength / numBars);
                    const barHeight = (dataArray[dataIndex] / 255) * canvas.height * 0.8;
                    
                    // Create gradient colors based on frequency
                    const hue = (barHeight / canvas.height) * 120; // Green to red
                    canvasCtx.fillStyle = `hsl(${hue}, 70%, 60%)`;
                    
                    // Draw bar from bottom up
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 2;
                }

                // Update time display
                updateTimeDisplay();
                
                animationId = requestAnimationFrame(drawVisualizer);
            };

            // Event Listeners
            playButton.addEventListener('click', () => {
                messageModal.style.display = 'none';
                playAudio();
            });

            togglePlayPauseButton.addEventListener('click', togglePlayPause);

            volumeSlider.addEventListener('input', (e) => {
                const volume = e.target.value;
                if (audioSource) {
                    audioSource.gain.value = volume;
                }
            });

            seekSlider.addEventListener('input', (e) => {
                if (!audioBuffer) return;
                
                const seekPercent = e.target.value / 100;
                const seekTime = seekPercent * audioBuffer.duration;
                
                if (isPlaying) {
                    // Stop current playback and restart from new position
                    sourceNode.stop();
                    setupAudioNodes();
                    sourceNode.start(0, seekTime);
                    startTime = audioCtx.currentTime - seekTime;
                    pauseTime = 0;
                } else {
                    // Just update pause time for next play
                    pauseTime = seekTime;
                    isPaused = true;
                }
                updateTimeDisplay();
            });

            // Initial setup
            getAudioData().then(() => {
                drawVisualizer();
            });

            // Show the initial message modal
            messageModal.style.display = 'block';
        });
    </script>
</body>
</html>
