tunnel: fb12a7ad-53d1-4cc8-9e48-c5ffa5062e5d
# Using managed tunnel (configured via Cloudflare dashboard)
# credentials-file not needed for managed tunnels

ingress:
  # Backend API routes - Must come before frontend
  - hostname: enjoyyy.mmmmichael.com
    path: /api/*
    service: http://localhost:5000
    originRequest:
      noHappyEyeballs: true
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      httpHostHeader: enjoyyy.mmmmichael.com

  # Frontend (Next.js) - Main app
  - hostname: enjoyyy.mmmmichael.com
    service: http://localhost:3001
    originRequest:
      noHappyEyeballs: true
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      httpHostHeader: enjoyyy.mmmmichael.com

  # Catch-all (404)
  - service: http_status:404

