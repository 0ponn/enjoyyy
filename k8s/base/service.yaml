apiVersion: v1
kind: Service
metadata:
  name: enjoyyy-backend
  namespace: enjoyyy
  labels:
    app.kubernetes.io/name: enjoyyy
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: enjoyyy
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: enjoyyy-frontend
  namespace: enjoyyy
  labels:
    app.kubernetes.io/name: enjoyyy
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: enjoyyy
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: enjoyyy-nodeport
  namespace: enjoyyy
  labels:
    app.kubernetes.io/name: enjoyyy
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: enjoyyy
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30301
